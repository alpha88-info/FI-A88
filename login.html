<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CS Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

  <div class="login-box">
    <h2>CS Login</h2>

    <form id="login-form">
      <input type="text" id="username" placeholder="ชื่อผู้ใช้" autocomplete="username" required autofocus>
      <input type="password" id="password" placeholder="รหัสผ่าน" autocomplete="current-password" required>
      <button type="submit" id="login-btn">เข้าสู่ระบบ</button>
    </form>

    <p id="error" class="error-msg"></p>
    <div id="loading" class="loading hidden">กำลังตรวจสอบ...</div>
  </div>

  <script src="login.js"></script>
</body>
</html>
